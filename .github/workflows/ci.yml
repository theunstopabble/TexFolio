name: TexFolio CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Step 1: Security & Linting
  security-and-lint:
    name: Security & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit (non-blocking)
        run: npm audit --production --audit-level=high
        continue-on-error: true
      - name: Lint check
        run: npm run lint --workspace=@texfolio/api && npm run lint --workspace=@texfolio/web
        continue-on-error: true
      - name: Build deployment
        run: npm run build:deploy

  # Step 2: Build Verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: security-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for build artifacts
        run: |
          echo "Verifying build output..."
          test -d apps/api/dist || echo "API build missing!"
          test -d apps/web/dist || echo "Web build missing!"